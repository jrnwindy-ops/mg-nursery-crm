<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4332">
<title>M&G Nursery Tracker</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --g50:#F4F9F4; --g100:#E5F0E5; --g200:#C7E0C7; --g300:#A8D5A2; --g400:#74C69D;
  --g500:#52B788; --g600:#4B9A4B; --g700:#2D6A4F; --g800:#1B4332; --g900:#0D2B1E;
  --amber:#D97706; --red:#DC2626; --blue:#1D4ED8; --purple:#7C3AED;
  --bg:#FAFAF7; --surf:#FFFFFF; --bd:#E5E7EB;
  --tx:#111827; --tx2:#374151; --tx3:#6B7280; --tx4:#9CA3AF;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--tx); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
button, input, textarea, select { font-family:inherit; }

.app-header { background:var(--g900); color:#fff; padding:14px 16px 12px; position:sticky; top:0; z-index:50; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.app-header-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.app-title { font-family:'DM Serif Display',serif; font-size:18px; line-height:1; }
.app-subtitle { font-size:11px; color:var(--g200); letter-spacing:.04em; margin-top:2px; }
.app-actions { display:flex; gap:6px; flex-wrap:wrap; }
.action-btn { background:rgba(255,255,255,.12); color:#fff; border:none; border-radius:8px; padding:6px 11px; font-size:11px; font-weight:700; cursor:pointer; }
.action-btn:hover { background:rgba(255,255,255,.2); }

.view-toggle { background:var(--surf); border-bottom:1px solid var(--bd); padding:10px 16px; display:flex; gap:6px; position:sticky; top:60px; z-index:40; flex-wrap:wrap; }
.view-btn { background:var(--bg); border:1.5px solid var(--bd); border-radius:8px; padding:8px 12px; font-size:12px; font-weight:700; color:var(--tx2); cursor:pointer; }
.view-btn.active { background:var(--g800); color:#fff; border-color:var(--g800); }
.search-input { flex:1; min-width:120px; background:var(--bg); border:1.5px solid var(--bd); border-radius:8px; padding:8px 12px; font-size:13px; outline:none; color:var(--tx); }
.search-input:focus { border-color:var(--g500); }

.stats-bar { background:var(--surf); border-bottom:1px solid var(--bd); padding:10px 16px; display:flex; gap:8px; overflow-x:auto; }
.stat-pill { flex:1; min-width:90px; background:var(--g50); border:1px solid var(--g200); border-radius:10px; padding:8px 10px; text-align:center; flex-shrink:0; }
.stat-num { font-size:18px; font-weight:800; color:var(--g800); line-height:1; }
.stat-lbl { font-size:9px; color:var(--g600); font-weight:600; margin-top:3px; text-transform:uppercase; letter-spacing:.05em; }

.main { padding:14px 12px 80px; }

.house-group { margin-bottom:22px; }
.house-header { display:flex; align-items:center; justify-content:space-between; padding:6px 4px 10px; }
.house-name { font-family:'DM Serif Display',serif; font-size:18px; color:var(--g800); }
.house-meta { font-size:11px; color:var(--tx3); font-weight:600; }
.subhouse-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }

.sub-card { background:var(--surf); border:1.5px solid var(--bd); border-radius:12px; padding:11px 12px; cursor:pointer; transition:all .15s; position:relative; }
.sub-card:hover { border-color:var(--g500); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
.sub-id { font-size:13px; font-weight:800; color:var(--g800); }
.sub-type { font-size:9px; color:var(--tx3); font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-top:1px; }
.sub-varieties { margin-top:8px; min-height:34px; }
.sub-variety-row { font-size:11px; color:var(--tx2); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sub-variety-row strong { color:var(--tx); }
.sub-empty { font-size:11px; color:var(--tx4); font-style:italic; }
.sub-totals { margin-top:8px; padding-top:6px; border-top:1px solid var(--bd); display:flex; justify-content:space-between; font-size:10px; color:var(--g600); font-weight:700; }
.sub-status { position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:50%; }
.status-budwood { background:var(--purple); }
.status-seedling { background:#0EA5E9; }
.status-tree { background:var(--g500); }
.status-empty { background:var(--tx4); opacity:.4; }

.map-wrap { background:var(--surf); border-radius:12px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.05); margin-bottom:16px; overflow-x:auto; }
.map-title { font-family:'DM Serif Display',serif; font-size:15px; color:var(--g800); margin-bottom:4px; }
.map-meta { font-size:10px; color:var(--tx3); margin-bottom:12px; }
.map-row-label { font-size:9px; font-weight:700; color:var(--tx3); text-align:center; padding:4px 0 2px; letter-spacing:.05em; }

.h1-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; max-width:520px; }
.h2-grid { display:grid; grid-template-columns:repeat(20,1fr); gap:2px; min-width:800px; }

.map-cell { aspect-ratio:1.2 / 1; background:var(--g50); border:1.5px solid var(--g200); border-radius:5px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2px; transition:all .15s; min-width:0; }
.map-cell:hover { background:var(--g100); border-color:var(--g500); transform:scale(1.05); z-index:2; box-shadow:0 4px 12px rgba(0,0,0,.15); }
.map-cell.has-content { background:var(--g600); color:#fff; border-color:var(--g700); }
.map-cell.budwood { background:var(--purple); color:#fff; border-color:#6D28D9; }
.map-cell.seedling { background:#0EA5E9; color:#fff; border-color:#0284C7; }
.map-cell-num { font-size:9px; font-weight:800; line-height:1; }
.map-cell-var { font-size:7px; font-weight:600; line-height:1; margin-top:2px; opacity:.9; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 1px; text-align:center; }
.map-cell-count { font-size:6px; opacity:.7; margin-top:1px; }

.map-legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; padding-top:10px; border-top:1px solid var(--bd); }
.leg-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--tx3); font-weight:600; }
.leg-dot { width:11px; height:11px; border-radius:3px; }

.detail-page { display:none; }
.detail-page.open { display:block; }
.detail-hero { background:linear-gradient(135deg,var(--g800) 0%,var(--g700) 100%); color:#fff; padding:18px 16px 22px; }
.detail-back { background:rgba(255,255,255,.15); border:none; border-radius:8px; padding:6px 10px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; margin-bottom:10px; }
.detail-id { font-size:11px; color:var(--g200); font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px; }
.detail-name { font-family:'DM Serif Display',serif; font-size:24px; line-height:1.15; margin-bottom:4px; }
.detail-sub { font-size:13px; color:var(--g200); }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.detail-tag { background:rgba(255,255,255,.18); border-radius:14px; padding:4px 10px; font-size:11px; font-weight:600; }

.detail-body { padding:16px 14px 100px; }
.section-title { font-size:11px; color:var(--tx3); font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }

.entries-table { background:var(--surf); border:1px solid var(--bd); border-radius:12px; overflow:hidden; margin-bottom:14px; }
.entries-header { background:var(--g50); padding:8px 10px; display:grid; grid-template-columns:1.2fr 1fr 70px 70px 30px; gap:6px; font-size:9px; font-weight:700; color:var(--tx3); text-transform:uppercase; border-bottom:1px solid var(--bd); }
.entry-row { padding:10px; display:grid; grid-template-columns:1.2fr 1fr 70px 70px 30px; gap:6px; align-items:center; border-bottom:1px solid var(--bd); font-size:12px; cursor:pointer; }
.entry-row:last-child { border-bottom:none; }
.entry-row:hover { background:var(--g50); }
.entry-scion { font-weight:700; color:var(--tx); }
.entry-rootstock { color:var(--tx2); }
.entry-qty { font-weight:700; color:var(--g800); text-align:right; }
.entry-sellable { color:var(--g600); text-align:right; font-size:11px; }
.entry-meta { font-size:10px; color:var(--tx3); margin-top:2px; }
.del-btn { background:none; border:none; color:#EF4444; cursor:pointer; font-size:14px; padding:4px; opacity:.5; }
.del-btn:hover { opacity:1; }

.add-entry-btn { background:var(--g100); color:var(--g800); border:2px dashed var(--g400); border-radius:10px; padding:12px; font-size:13px; font-weight:700; cursor:pointer; width:100%; margin-top:10px; }
.add-entry-btn:hover { background:var(--g200); }

.tasks-list { background:var(--surf); border:1px solid var(--bd); border-radius:12px; overflow:hidden; }
.task-item { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--bd); font-size:13px; }
.task-item:last-child { border-bottom:none; }
.task-dot { width:6px; height:6px; border-radius:50%; background:var(--g500); flex-shrink:0; }
.no-tasks { padding:14px; text-align:center; color:var(--tx4); font-size:13px; font-style:italic; background:var(--surf); border:1px dashed var(--bd); border-radius:10px; }

.action-bar { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.btn-primary, .btn-secondary { flex:1; min-width:120px; padding:13px 14px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:none; }
.btn-primary { background:var(--g800); color:#fff; }
.btn-secondary { background:var(--surf); color:var(--g800); border:1.5px solid var(--g500); }

.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-bg.open { opacity:1; pointer-events:auto; }
.modal { background:var(--surf); width:100%; max-width:480px; max-height:90vh; border-radius:20px 20px 0 0; padding:18px 16px 22px; transform:translateY(20px); transition:transform .2s; overflow-y:auto; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--bd); border-radius:2px; margin:0 auto 14px; }
.form-label { font-size:11px; color:var(--tx3); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; display:block; margin-top:4px; }
.form-input { width:100%; background:var(--bg); border:1.5px solid var(--bd); border-radius:10px; padding:11px 12px; font-size:14px; outline:none; margin-bottom:10px; color:var(--tx); }
.form-input:focus { border-color:var(--g500); }
.form-row { display:flex; gap:10px; }
.form-row > div { flex:1; }
.form-actions { display:flex; gap:8px; margin-top:14px; }
.btn-cancel { flex:1; background:#F3F4F6; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; }
.btn-submit { flex:2; background:var(--g800); border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; color:#fff; }

.quick-tag { background:var(--g100); color:var(--g800); border-radius:14px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; }

@media (max-width:480px) {
  .entries-header, .entry-row { grid-template-columns:1.2fr 1fr 60px 30px; }
  .entries-header > div:nth-child(4), .entry-row > div:nth-child(4) { display:none; }
}

/* SHEET VIEW */
.sheet-wrap { background:var(--surf); border-radius:12px; padding:0; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.05); margin-bottom:16px; }
.sheet-toolbar { padding:12px 14px; border-bottom:1px solid var(--bd); display:flex; gap:8px; align-items:center; flex-wrap:wrap; background:var(--g50); }
.sheet-add-btn { background:var(--g800); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; }
.sheet-add-btn:hover { background:var(--g900); }
.sheet-csv-btn { background:var(--surf); color:var(--g800); border:1.5px solid var(--g500); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; }
.sheet-info { margin-left:auto; font-size:11px; color:var(--tx3); font-weight:600; }
.sheet-info.saving { color:var(--amber); }
.sheet-info.saved { color:var(--g600); }

.sheet-scroll { overflow-x:auto; max-height:70vh; overflow-y:auto; }
table.sheet { width:100%; border-collapse:separate; border-spacing:0; font-size:12px; min-width:1100px; }
table.sheet thead th { position:sticky; top:0; background:var(--g800); color:#fff; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; text-align:left; border-right:1px solid var(--g700); white-space:nowrap; z-index:3; }
table.sheet thead th:last-child { border-right:none; }
table.sheet thead th.num { text-align:right; }

table.sheet tbody tr { border-bottom:1px solid var(--bd); }
table.sheet tbody tr.budwood { background:#FBF7FF; }
table.sheet tbody tr.budwood:hover { background:#F3EDFF; }
table.sheet tbody tr.seedling { background:#F0F9FF; }
table.sheet tbody tr.seedling:hover { background:#E0F2FE; }
table.sheet tbody tr.tree { background:var(--surf); }
table.sheet tbody tr.tree:hover { background:var(--g50); }
table.sheet tbody tr.row-totals { background:var(--g100); font-weight:800; position:sticky; bottom:0; z-index:2; }

table.sheet td { padding:0; border-right:1px solid var(--bd); vertical-align:middle; }
table.sheet td:last-child { border-right:none; }
table.sheet td.cell-label { padding:6px 10px; font-weight:700; color:var(--g800); font-size:11px; white-space:nowrap; }
table.sheet td.cell-sub { padding:6px 10px; color:var(--tx2); font-size:11px; white-space:nowrap; }
table.sheet td.cell-type { padding:6px 10px; font-size:9px; color:var(--tx3); font-weight:600; text-transform:uppercase; }
table.sheet td.cell-auto { padding:6px 10px; color:var(--g700); font-weight:700; text-align:right; font-size:11px; }
table.sheet td.cell-del { padding:0; text-align:center; }

table.sheet input.cell-input, table.sheet select.cell-input { width:100%; height:100%; min-height:34px; border:none; background:transparent; padding:6px 10px; font-family:inherit; font-size:12px; color:var(--tx); outline:none; box-sizing:border-box; }
table.sheet input.cell-input:focus, table.sheet select.cell-input:focus { background:#FFFBEB; box-shadow:inset 0 0 0 2px var(--amber); }
table.sheet input.cell-input.num { text-align:right; }
table.sheet input.cell-input.changed { background:#ECFCCB; }

table.sheet td.cell-del button { background:none; border:none; color:#EF4444; font-size:14px; cursor:pointer; padding:8px 10px; opacity:.4; }
table.sheet td.cell-del button:hover { opacity:1; }

.sheet-filter { background:var(--bg); border:1.5px solid var(--bd); border-radius:8px; padding:7px 12px; font-size:12px; outline:none; flex:1; min-width:140px; max-width:280px; }
.sheet-filter:focus { border-color:var(--g500); }

@media (max-width:480px) {
  table.sheet { min-width:900px; font-size:11px; }
  table.sheet thead th { padding:6px 8px; }
  table.sheet input.cell-input { padding:5px 8px; font-size:11px; min-height:30px; }
}

</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-row">
    <div>
      <div class="app-title">M&amp;G Nursery</div>
      <div class="app-subtitle">House &amp; Inventory Tracker</div>
    </div>
    <div class="app-actions">
      <button class="action-btn" onclick="exportBackup()" title="Download backup file">↓ Backup</button>
      <button class="action-btn" onclick="restoreFromBackup()" title="Restore from backup file">↑ Restore</button>
      <button class="action-btn" onclick="exportReport()">📄 Report</button>
    </div>
  </div>
</div>

<div class="view-toggle">
  <button class="view-btn active" id="view-list-btn" onclick="setView('list')">📋 List</button>
  <button class="view-btn" id="view-map-btn" onclick="setView('map')">🗺️ Map</button>
  <button class="view-btn" id="view-sheet-btn" onclick="setView('sheet')">📊 Sheet</button>
  <button class="view-btn" id="view-tasks-btn" onclick="setView('tasks')">✓ Tasks <span id="view-tasks-count" style="display:none;background:#D97706;color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:3px;font-weight:700"></span></button>
  <input type="text" class="search-input" id="search-input" placeholder="Search variety, rootstock, house..." oninput="renderHome()">
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="main">
  <div id="home-content"></div>
  <div id="detail-content" class="detail-page"></div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="modal-entry">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px" id="entry-modal-title">Add Variety Entry</div>
    <div style="font-size:12px;color:var(--tx3);margin-bottom:14px" id="entry-modal-section"></div>

    <label class="form-label">Type</label>
    <select class="form-input" id="entry-type">
      <option value="Grafted Tree">Grafted Tree (default)</option>
      <option value="Seedling">Seedling (rootstock only, not grafted yet)</option>
      <option value="Sleeve">Sleeve (empty, awaiting seedling)</option>
    </select>

    <label class="form-label">Placement (Row in House)</label>
    <div class="form-row">
      <div>
        <select class="form-input" id="entry-row">
          <option value="">— Row —</option>
          <option value="1">Row 1</option>
          <option value="2">Row 2</option>
          <option value="3">Row 3</option>
          <option value="4">Row 4</option>
          <option value="5">Row 5</option>
          <option value="6">Row 6</option>
          <option value="7">Row 7</option>
          <option value="8">Row 8</option>
        </select>
      </div>
      <div>
        <select class="form-input" id="entry-rowsub">
          <option value="">— Sub (optional) —</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </div>
    </div>

    <label class="form-label">Scion / Variety</label>
    <select class="form-input" id="entry-scion">
      <option value="">— Select scion —</option>
      <option value="None">None (rootstock only)</option>
      <option value="Tango">Tango</option>
      <option value="Page">Page</option>
      <option value="W. Murcott">W. Murcott</option>
      <option value="W. Murcott Mandarin">W. Murcott Mandarin</option>
      <option value="Nules Clementine">Nules Clementine</option>
      <option value="Fisher">Fisher</option>
      <option value="Star Ruby">Star Ruby</option>
      <option value="Eureka">Eureka</option>
      <option value="Lisbon">Lisbon</option>
      <option value="Washington">Washington</option>
      <option value="Parent Washington">Parent Washington</option>
      <option value="P. Wash">P. Wash</option>
      <option value="Fukumoto">Fukumoto</option>
      <option value="Autumn Gold">Autumn Gold</option>
      <option value="A. Gold">A. Gold</option>
      <option value="Powell">Powell</option>
      <option value="Gillette">Gillette</option>
      <option value="Late Lane">Late Lane</option>
      <option value="Olinda">Olinda</option>
      <option value="Palestine Sweet Lime">Palestine Sweet Lime</option>
      <option value="Shiranui">Shiranui</option>
      <option value="DaisySL">DaisySL</option>
      <option value="Valencia">Valencia</option>
      <option value="Navel">Navel</option>
      <option value="Paige">Paige</option>
      <option value="Australian Finger Lime">Australian Finger Lime</option>
      <option value="Summer Gold Mandarin">Summer Gold Mandarin</option>
      <option value="Cara Cara">Cara Cara</option>
      <option value="Chandler Pummelo">Chandler Pummelo</option>
      <option value="Persian">Persian</option>
      <option value="Sweet Lime">Sweet Lime</option>
      <option value="Other">Other (specify in notes)</option>
    </select>

    <label class="form-label">Rootstock</label>
    <select class="form-input" id="entry-rootstock">
      <option value="">— Select rootstock —</option>
      <option value="None">None</option>
      <option value="Carrizo">Carrizo</option>
      <option value="C-35">C-35</option>
      <option value="C35">C35</option>
      <option value="Rich 16">Rich 16</option>
      <option value="Rich 16-6">Rich 16-6</option>
      <option value="Rubidoux">Rubidoux</option>
      <option value="Rubi">Rubi</option>
      <option value="Trifoliate">Trifoliate</option>
      <option value="Macrophylla">Macrophylla</option>
      <option value="Atwood">Atwood</option>
      <option value="Other">Other</option>
    </select>

    <label class="form-label">Transplant / Notes</label>
    <input class="form-input" id="entry-transplant" type="text" placeholder="Optional notes">

    <div class="form-row">
      <div>
        <label class="form-label">Quantity</label>
        <input class="form-input" id="entry-qty" type="number" min="0" placeholder="e.g. 5000">
      </div>
      <div>
        <label class="form-label">Take Rate %</label>
        <input class="form-input" id="entry-takerate" type="number" min="0" max="100" value="70">

async function loadFromCloud() {
  if (!cloudOk) return;
  try {
    const r = await sb.from('nursery_sections_v2').select('*');
    if (r.error) { console.warn('Nursery cloud load error:', r.error); return; }
    
    if (!r.data || r.data.length === 0) {
      // Empty cloud — seed it from the hardcoded SECTIONS object
      console.log('[nursery] Cloud is empty, seeding initial data...');
      await seedCloudFromLocal();
    } else {
      // Cloud has data — overlay onto SECTIONS (cloud wins over hardcoded defaults)
      console.log('[nursery] Loaded ' + r.data.length + ' sections from cloud');
      r.data.forEach(row => {
        if (SECTIONS[row.section_id]) {
          if (row.entries) SECTIONS[row.section_id].entries = row.entries;
          if (row.take_rate !== undefined && row.take_rate !== null) {
            SECTIONS[row.section_id].takeRate = row.take_rate;
          }
        }
      });
    }
    
    // Load pending tasks
    const tr = await sb.from('nursery_tasks').select('*').eq('status', 'pending');
    if (tr.data) {
      // Reset tasks first so we don't double-add on reload
      Object.values(SECTIONS).forEach(s => { s.tasks = []; });
      tr.data.forEach(t => {
        if (SECTIONS[t.section_id]) {
          const dateStr = t.scheduled_date ? '[' + t.scheduled_date + '] ' : '';
          SECTIONS[t.section_id].tasks.push('TASK: ' + dateStr + t.task);
        }
      });
    }
    
    // Also load Phase 2 variety-pool reservations
    loadReservationsPool().catch(e => console.warn('loadReservationsPool error:', e));
    // Load task rows (for assignee/rowId lookup in Tasks view)
    _loadNurseryTaskRows().then(() => { if (currentView === 'tasks') renderHome(); });
    // Re-render and start real-time subscription
    renderHome();
    startRealtimeSubscriptions();
  } catch(e) {
    console.warn('Nursery cloud load failed:', e);
  }
}

// ── RESERVATIONS POOL (Phase 2: CRM↔Nursery integration) ───────────────────
// Variety-pool reservations from the CRM. These exist BEFORE Phase 3 fulfillment
// assigns trees to specific houses. The Reserved tile sums both:
//   - Pool reservations from CRM contracts (active status)
//   - Per-entry reservedQty (Phase 3, when trees are pinned to specific sections)
let RESERVATIONS_POOL_TOTAL = 0;

async function loadReservationsPool() {
  if (!cloudOk || !sb) return;
  try {
    const { data, error } = await sb.from('reservations').select('quantity, status').eq('status', 'active');
    if (error) { console.warn('Reservations pool load error:', error); return; }
    RESERVATIONS_POOL_TOTAL = (data || []).reduce((sum, r) => sum + (parseInt(r.quantity) || 0), 0);
    console.log('[reservations] Loaded pool total: ' + RESERVATIONS_POOL_TOTAL.toLocaleString() + ' active reservations');
    if (typeof renderStats === 'function') try { renderStats(); } catch(e){}
  } catch (e) { console.warn('Reservations pool load failed:', e); }
}

async function seedCloudFromLocal() {
  // One-time bulk seed: push all 56 sections from hardcoded SECTIONS to Supabase
  if (!cloudOk) return;
  const rows = Object.values(SECTIONS).map(s => ({
    section_id: s.id,
    house: s.house,
    subhouse: s.subhouse,
    side: s.side,
    section_idx: s.sectionIdx,
    section_type: s.sectionType,
    entries: s.entries || [],
    take_rate: s.takeRate || 85,
    updated_at: new Date().toISOString(),
  }));
  // Batch insert in chunks of 20 to be safe
  const CHUNK = 20;
  for (let i = 0; i < rows.length; i += CHUNK) {
    const chunk = rows.slice(i, i + CHUNK);
    const { error } = await sb.from('nursery_sections_v2').upsert(chunk, { onConflict: 'section_id' });
    if (error) { console.warn('Seed chunk error:', error); }
  }
  console.log('[nursery] Seeded ' + rows.length + ' sections to cloud');
}

function startRealtimeSubscriptions() {
  if (!cloudOk || window._nurseryRealtimeStarted) return;
  window._nurseryRealtimeStarted = true;
  
  // Subscribe to section changes (any device's edit will be reflected here)
  sb.channel('nursery-sections-realtime')
    .on('postgres_changes', {event: '*', schema: 'public', table: 'nursery_sections_v2'}, payload => {
      const row = payload.new || payload.old;
      if (!row || !row.section_id) return;
      if (SECTIONS[row.section_id]) {
        if (payload.eventType === 'DELETE') {
          SECTIONS[row.section_id].entries = [];
        } else {
          if (row.entries) SECTIONS[row.section_id].entries = row.entries;
          if (row.take_rate !== undefined && row.take_rate !== null) {
            SECTIONS[row.section_id].takeRate = row.take_rate;
          }
        }
        // Only re-render if not currently editing (avoid clobbering user input)
        if (!document.getElementById('entry-modal-bg')?.classList.contains('open')) {
          renderHome();
          // Refresh open section view if any
          if (window.currentSectionId === row.section_id && typeof openSection === 'function') {
            openSection(window.currentSectionId);
          }
        }
      }
    })
    .subscribe();
  
  // Subscribe to task changes
  sb.channel('nursery-tasks-realtime')
    .on('postgres_changes', {event: '*', schema: 'public', table: 'nursery_tasks'}, async () => {
      // Easiest: just reload all pending tasks
      const tr = await sb.from('nursery_tasks').select('*').eq('status', 'pending');
      if (tr.data) {
        Object.values(SECTIONS).forEach(s => { s.tasks = []; });
        tr.data.forEach(t => {
          if (SECTIONS[t.section_id]) {
            const dateStr = t.scheduled_date ? '[' + t.scheduled_date + '] ' : '';
            SECTIONS[t.section_id].tasks.push('TASK: ' + dateStr + t.task);
          }
        });
        renderHome();
      }
    })
    .subscribe();
  
  // Subscribe to reservations changes (Phase 2: CRM-driven changes)
  sb.channel('nursery-reservations-realtime')
    .on('postgres_changes', {event: '*', schema: 'public', table: 'reservations'}, async () => {
      await loadReservationsPool();
    })
    .subscribe();

  console.log('[nursery] Real-time subscriptions started (sections, tasks, reservations)');
}

async function saveSectionToCloud(s) {
  if (!cloudOk) return;
  try {
    await sb.from('nursery_sections_v2').upsert({
      section_id: s.id, house: s.house, subhouse: s.subhouse, side: s.side,
      section_idx: s.sectionIdx, section_type: s.sectionType,
      entries: s.entries, take_rate: s.takeRate,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'section_id' });
  } catch(e) {}
}

async function saveTaskToCloud(sectionId, task, date, assignee) {
  if (!cloudOk) return null;
  try {
    const { data, error } = await sb.from('nursery_tasks').insert({
      section_id: sectionId, task: task,
      scheduled_date: date || null, assignee: assignee || null,
      status: 'pending', created_at: new Date().toISOString(),
    }).select().single();
    if (error) { console.warn('saveTaskToCloud error:', error); return null; }
    return data ? data.id : null;
  } catch(e) { console.warn('saveTaskToCloud exception:', e); return null; }
}

function calcStats() {
  const sections = Object.values(SECTIONS);
  let active = 0, planted = 0, sellable = 0, reserved = 0, tasks = 0, totalEntries = 0;
  let sleeves = 0, seedlings = 0;
  sections.forEach(s => {
    if (s.entries && s.entries.length > 0) {
      active++;
      totalEntries += s.entries.length;
      s.entries.forEach(e => {
        // Infer type for backward compatibility with old entries that don't have e.type
        let t = e.type;
        if (!t) {
          if (e.scion && e.rootstock) t = 'Grafted Tree';
          else if (e.rootstock && !e.scion) t = 'Seedling';
          else if (!e.scion && !e.rootstock && (e.quantity || 0) > 0) t = 'Sleeve';
          else t = 'Grafted Tree';
        }
        const qty = e.quantity || 0;
        if (t === 'Sleeve') {
          // Sleeves don't count toward Planted or Sellable
          sleeves += qty;
        } else if (t === 'Seedling') {
          // Seedlings count toward Planted but not Sellable (not grafted yet)
          seedlings += qty;
          planted += qty;
          reserved += (e.reservedQty || 0);
        } else {
          // Grafted Tree — current behavior
          planted += qty;
          const rate = e.takeRate !== undefined ? e.takeRate : 85;
          sellable += Math.floor(qty * rate / 100);
          reserved += (e.reservedQty || 0);
        }
      });
    }
    tasks += (s.tasks || []).filter(t => t.startsWith('TASK:')).length;
  });
  // Add variety-pool reservations from CRM contracts (Phase 2)
  // Note: this is at the variety-pool level — Phase 3 will pin to specific entries
  const totalReserved = reserved + (RESERVATIONS_POOL_TOTAL || 0);
  return { active, totalQty: planted, sellable, reserved: totalReserved, tasks, totalEntries, sleeves, seedlings };
}

function setView(view) {
  currentView = view;
  document.getElementById('view-list-btn').classList.toggle('active', view === 'list');
  document.getElementById('view-map-btn').classList.toggle('active', view === 'map');
  document.getElementById('view-sheet-btn').classList.toggle('active', view === 'sheet');
  const tb = document.getElementById('view-tasks-btn');
  if (tb) tb.classList.toggle('active', view === 'tasks');

  const search = document.getElementById('search-input');
  if (search) search.style.display = (view === 'tasks') ? 'none' : '';

function getStatusClass(s) {
  if (!s.entries || s.entries.length === 0) return 'status-empty';
  if (s.sectionType === 'Increase / Budwood') return 'status-budwood';
  if (s.sectionType === 'Seedling House') return 'status-seedling';
  return 'status-tree';
}

function getMapClass(s) {
  if (!s.entries || s.entries.length === 0) return '';
  if (s.sectionType === 'Increase / Budwood') return 'budwood';
  if (s.sectionType === 'Seedling House') return 'seedling';
  return 'has-content';
}

function filterSections(query) {
  const q = query.trim().toLowerCase();
  if (!q) return Object.values(SECTIONS);
  return Object.values(SECTIONS).filter(s => {
    if (s.id.toLowerCase().includes(q)) return true;
    if (s.subhouse.toLowerCase().includes(q)) return true;
    if (s.sectionType.toLowerCase().includes(q)) return true;
    return (s.entries || []).some(e =>
      (e.scion || '').toLowerCase().includes(q) ||
      (e.rootstock || '').toLowerCase().includes(q) ||
      (e.transplant || '').toLowerCase().includes(q)
    );
  });
}

function renderHome() {
  renderStats();
  const query = document.getElementById('search-input').value;
  const filtered = filterSections(query);
  const content = document.getElementById('home-content');
  document.getElementById('detail-content').classList.remove('open');
  if (currentView === 'list') content.innerHTML = renderListView(filtered);
  else if (currentView === 'map') content.innerHTML = renderMapView(filtered);
  else if (currentView === 'sheet') content.innerHTML = renderSheetView(filtered);
  else if (currentView === 'tasks') content.innerHTML = renderTasksView();
  // Update Tasks badge count in toggle
  updateTasksToggleBadge();
}

// ── TASKS VIEW (Phase 1: see all open tasks across sections) ───────────────
let _taskFilter = { assignee: 'all', section: 'all' };
let _nurseryTaskRows = []; // populated from Supabase nursery_tasks table

async function _loadNurseryTaskRows() {
  if (!cloudOk || !sb) { _nurseryTaskRows = []; return; }
  try {
    const { data, error } = await sb.from('nursery_tasks').select('*').eq('status', 'pending').order('scheduled_date', { nullsFirst: false });
    if (error) { console.warn('Tasks load error:', error); return; }
    _nurseryTaskRows = data || [];
  } catch(e) { console.warn('Tasks load failed:', e); }
}

// Extract a flat list of {section_id, sectionLabel, task, date, assignee, rowId, completable}
function _flattenAllTasks() {
  const out = [];
  // Pull from in-memory SECTIONS object — these are what the UI shows
  Object.values(SECTIONS).forEach(s => {
    (s.tasks || []).forEach(t => {
      if (!t.startsWith('TASK:')) return;
      let label = t.replace('TASK:', '').trim();
      let date = '';
      const dateMatch = label.match(/^\[([\d-]+)\]\s*/);
      if (dateMatch) { date = dateMatch[1]; label = label.replace(dateMatch[0], '').trim(); }
      // Find matching task row in cloud data to get assignee + ID
      const cloudRow = _nurseryTaskRows.find(r => r.section_id === s.id && r.task === label);
      out.push({
        section_id: s.id,
        sectionLabel: s.house + ' · ' + s.subhouse,
        sectionType: s.sectionType,
        task: label,
        date: date || (cloudRow ? cloudRow.scheduled_date : '') || '',
        assignee: cloudRow ? (cloudRow.assignee || '') : '',
        rowId: cloudRow ? cloudRow.id : null,
      });
    });
  });
  // Sort by date (earliest first, undated last)
  out.sort((a, b) => {
    if (a.date && !b.date) return -1;
    if (!a.date && b.date) return 1;
    if (a.date && b.date) return a.date.localeCompare(b.date);
    return a.sectionLabel.localeCompare(b.sectionLabel);
  });
  return out;
}

function _allAssignees() {
  // Discover assignees from cloud task rows; always include standard admins
  const set = new Set(['Raffi', 'Abram', 'Father']);
  _nurseryTaskRows.forEach(r => { if (r.assignee && r.assignee.trim()) set.add(r.assignee.trim()); });
  return Array.from(set);
}

function setTaskFilter(field, value) {
  _taskFilter[field] = value;

}

function updateTasksToggleBadge() {
  const all = _flattenAllTasks();

    else { badge.style.display = 'none'; }
  }
}

        : '<span style="font-size:11px;background:#F3F4F6;color:#9CA3AF;border-radius:8px;padding:2px 7px">No date</span>';
      const assigneeBadge = t.assignee
        ? '<span style="font-size:11px;background:#DBEAFE;color:#1E40AF;border-radius:8px;padding:2px 7px;font-weight:600">@' + t.assignee + '</span>'

async function completeTaskFromList(rowId, sectionId, encodedTask) {
  const taskLabel = decodeURIComponent(encodedTask);
  if (!confirm('Mark this task as complete?')) return;
  // Update cloud row to status=completed
  try {
    await sb.from('nursery_tasks').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', rowId);
  } catch(e) { console.warn('Complete task cloud error:', e); }
  // Remove from local section's tasks array
  const s = SECTIONS[sectionId];
  if (s && s.tasks) {
    s.tasks = s.tasks.filter(t => {
      const cleaned = t.replace('TASK:', '').replace(/^\[[\d-]+\]\s*/, '').trim();
      return cleaned !== taskLabel;
    });
  }
  // Invalidate the history cache for this section so next open shows the new completion
  delete _sectionHistoryCache[sectionId];
  // Reload cloud tasks then re-render
  await _loadNurseryTaskRows();
  renderHome();
}

function sendTaskWAFromList(sectionId, encodedTask, date, assignee, rowId) {
  const taskLabel = decodeURIComponent(encodedTask);
  const s = SECTIONS[sectionId];
  if (!s) return;
  const sectionLabel = s.house + ' ' + s.subhouse + ' (' + s.sectionType + ')';
  const dateStr = date ? '\nDate: ' + date : '';
  const assigneeStr = assignee ? '\nFor: ' + assignee : '';
  // If we have the cloud rowId, build a one-tap complete link. Otherwise just a section link.
  const baseUrl = window.location.origin;
  const url = rowId
    ? baseUrl + '#section=' + encodeURIComponent(sectionId) + '&complete=' + rowId
    : baseUrl + '#section=' + encodeURIComponent(sectionId);
  const linkLabel = rowId ? 'Tap to mark complete when done:' : 'Open in app:';
  const msg = 'M&G Nursery — Task\n' +
              'Section: ' + sectionLabel + '\n' +
              'Task: ' + taskLabel + dateStr + assigneeStr + '\n\n' +
              linkLabel + '\n' + url;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function renderListView(sections) {
  const h1 = sections.filter(s => s.house === 'House 1');
  const h2 = sections.filter(s => s.house === 'House 2');
  function buildGroup(name, meta, items) {
    if (!items.length) return '';
    return '<div class="house-group">' +
      '<div class="house-header"><div class="house-name">' + name + '</div><div class="house-meta">' + meta + '</div></div>' +
      '<div class="subhouse-grid">' + items.map(s => buildCard(s)).join('') + '</div>' +
    '</div>';
  }
  const h1Total = h1.reduce((sum, s) => sum + (s.entries || []).reduce((a, e) => a + (e.quantity || 0), 0), 0);
  const h2Total = h2.reduce((sum, s) => sum + (s.entries || []).reduce((a, e) => a + (e.quantity || 0), 0), 0);
  return buildGroup('House 1', '16 sub-houses · ' + h1Total.toLocaleString() + ' trees', h1) +
         buildGroup('House 2', '40 sub-houses · ' + h2Total.toLocaleString() + ' trees', h2);
}

function _entryType(e) {
  // Backward-compat type detection for an entry
  if (e.type) return e.type;
  if (e.scion && e.rootstock) return 'Grafted Tree';
  if (e.rootstock && !e.scion) return 'Seedling';
  if (!e.scion && !e.rootstock && (e.quantity || 0) > 0) return 'Sleeve';
  return 'Grafted Tree';
}

function _typeBadge(type) {
  if (type === 'Sleeve') return '<span style="display:inline-block;background:#FEF3C7;color:#92400E;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;letter-spacing:.04em;text-transform:uppercase">SLEEVE</span>';
  if (type === 'Seedling') return '<span style="display:inline-block;background:#DBEAFE;color:#1E40AF;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;letter-spacing:.04em;text-transform:uppercase">SEEDLING</span>';
  return '';  // Grafted Tree = no badge (it's the default)
}

function buildCard(s) {
  const statusClass = getStatusClass(s);
  const entries = s.entries || [];
  const isEmpty = entries.length === 0;
  const totalQty = entries.reduce((sum, e) => sum + (e.quantity || 0), 0);
  const sellable = entries.reduce((sum, e) => sum + Math.floor((e.quantity || 0) * (e.takeRate !== undefined ? e.takeRate : 85) / 100), 0);
  const visible = entries.slice(0, 3);
  const more = entries.length - 3;
  const varHtml = isEmpty
    ? '<div class="sub-empty">Empty</div>'
    : visible.map(e => {
        const et = _entryType(e);
        let label;
        if (et === 'Sleeve') label = '<strong>Empty Sleeves</strong>';
        else if (et === 'Seedling') label = '<strong>' + (e.rootstock || '—') + ' seedling</strong>';
        else label = '<strong>' + (e.scion || '—') + '</strong>' + (e.rootstock ? ' / ' + e.rootstock : '');
        return '<div class="sub-variety-row">' + label + _typeBadge(et) + ' · ' + (e.quantity || 0).toLocaleString() + '</div>';
      }).join('') +
      (more > 0 ? '<div class="sub-variety-row" style="color:var(--g600);font-weight:700">+' + more + ' more</div>' : '');
  const taskCount = (s.tasks || []).filter(t => t.startsWith('TASK:')).length;
  const taskBadge = taskCount > 0
    ? '<div style="position:absolute;top:8px;right:8px;background:#D97706;color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:800;line-height:1.4;min-width:18px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.15)">' + taskCount + ' ✓</div>'
    : '';
  return '<div class="sub-card" style="position:relative" onclick="openSection(\'' + s.id + '\')">' +
    '<div class="sub-status ' + statusClass + '"></div>' +
    taskBadge +
    '<div class="sub-id">' + s.house + ' · ' + s.subhouse + '</div>' +
    '<div class="sub-type">' + s.sectionType + '</div>' +
    '<div class="sub-varieties">' + varHtml + '</div>' +
    (totalQty > 0 ? '<div class="sub-totals"><span>' + totalQty.toLocaleString() + ' trees</span><span>' + sellable.toLocaleString() + ' sellable</span></div>' : '') +
  '</div>';
}

function renderMapView(filtered) {
  const filterIds = new Set(filtered.map(s => s.id));
  function buildGrid(prefix, side, count, gridClass) {
    let html = '<div class="' + gridClass + '">';

    '<div class="leg-item"><div class="leg-dot" style="background:var(--purple)"></div>Increase / Budwood</div>' +
    '<div class="leg-item"><div class="leg-dot" style="background:#0EA5E9"></div>Seedling House</div>' +
    '<div class="leg-item"><div class="leg-dot" style="background:var(--g600)"></div>Tree House (Active)</div>' +
    '<div class="leg-item"><div class="leg-dot" style="background:var(--g50);border:1px solid var(--g300)"></div>Empty</div>' +
  '</div>';
  return '<div class="map-wrap">' +
    '<div class="map-title">House 1</div>' +
    '<div class="map-meta">16 sub-houses · N1-N2 + S1-S2 are Increase Tree Houses, rest are Tree Houses</div>' +
    '<div class="map-row-label">NORTH SIDE</div>' + buildGrid('H1', 'North', 8, 'h1-grid') +
    '<div class="map-row-label" style="margin-top:6px">SOUTH SIDE</div>' + buildGrid('H1', 'South', 8, 'h1-grid') +
  '</div>' +
  '<div class="map-wrap">' +
    '<div class="map-title">House 2</div>' +
    '<div class="map-meta">40 sub-houses · N1-N2 + S1-S2 are Seedling Houses, rest are Tree Houses · Scroll →</div>' +
    '<div class="map-row-label">NORTH SIDE</div>' + buildGrid('H2', 'North', 20, 'h2-grid') +
    '<div class="map-row-label" style="margin-top:6px">SOUTH SIDE</div>' + buildGrid('H2', 'South', 20, 'h2-grid') +
    legend +
  '</div>';
}

let _sheetFilter = '';
let _saveTimer = null;
let _pendingSaves = new Set();

const SCION_OPTIONS = ['','None','Tango','Page','W. Murcott','W. Murcott Mandarin','Nules Clementine','Fisher','Star Ruby','Eureka','Lisbon','Washington','Parent Washington','P. Wash','Fukumoto','Autumn Gold','A. Gold','Powell','Gillette','Late Lane','Olinda','Palestine Sweet Lime','Shiranui','DaisySL','Valencia','Navel','Paige','Australian Finger Lime','Summer Gold Mandarin','Cara Cara','Chandler Pummelo','Persian','Sweet Lime','Other'];
const ROOTSTOCK_OPTIONS = ['','None','Carrizo','C-35','C35','Rich 16','Rich 16-6','Rubidoux','Rubi','Trifoliate','Macrophylla','Atwood','Other'];

function renderSheetView(filteredSections) {
  // Build flat list of all entries with section reference
  const filterIds = new Set(filteredSections.map(s => s.id));
  const rows = [];
  Object.values(SECTIONS).forEach(s => {
    if (!filterIds.has(s.id)) return;
    (s.entries || []).forEach((e, idx) => {
      // Also filter by sheet filter (search box at top)
      if (_sheetFilter) {
        const q = _sheetFilter.toLowerCase();
        const matches = (e.scion || '').toLowerCase().includes(q) ||
          (e.rootstock || '').toLowerCase().includes(q) ||
          (e.transplant || '').toLowerCase().includes(q) ||
          s.house.toLowerCase().includes(q) ||
          s.subhouse.toLowerCase().includes(q) ||
          s.sectionType.toLowerCase().includes(q);
        if (!matches) return;
      }
      rows.push({ section: s, entry: e, entryIdx: idx });
    });
  });

  // Totals row
  const tQty = rows.reduce((sum, r) => sum + (r.entry.quantity || 0), 0);
  const tSellable = rows.reduce((sum, r) => sum + Math.floor((r.entry.quantity || 0) * (r.entry.takeRate !== undefined ? r.entry.takeRate : 85) / 100), 0);
  const tReserved = rows.reduce((sum, r) => sum + (r.entry.reservedQty || 0), 0);

  const cls = (s) => {
    if (s.sectionType === 'Increase / Budwood') return 'budwood';
    if (s.sectionType === 'Seedling House') return 'seedling';
    return 'tree';
  };

  const scionOpts = SCION_OPTIONS.map(v => '<option value="' + v + '">' + (v || '— Scion —') + '</option>').join('');
  const rootOpts = ROOTSTOCK_OPTIONS.map(v => '<option value="' + v + '">' + (v || '— Rootstock —') + '</option>').join('');

  const rowsHtml = rows.map(r => {
    const s = r.section, e = r.entry, idx = r.entryIdx;
    const rate = e.takeRate !== undefined ? e.takeRate : 85;
    const sellable = Math.floor((e.quantity || 0) * rate / 100);
    const k = s.id + ':' + idx;
    // Build selects with current value pre-selected
    const scionSel = SCION_OPTIONS.map(v => '<option value="' + v + '"' + (v === (e.scion || '') ? ' selected' : '') + '>' + (v || '— Scion —') + '</option>').join('');
    const rootSel = ROOTSTOCK_OPTIONS.map(v => '<option value="' + v + '"' + (v === (e.rootstock || '') ? ' selected' : '') + '>' + (v || '— Rootstock —') + '</option>').join('');

    return '<tr class="' + cls(s) + '" data-k="' + k + '">' +
      '<td class="cell-label">' + s.house + '</td>' +
      '<td class="cell-sub">' + s.subhouse + '</td>' +
      '<td class="cell-type">' + s.sectionType + '</td>' +
      '<td><select class="cell-input" onchange="updateEntry(\'' + s.id + '\',' + idx + ',\'scion\',this.value)">' + scionSel + '</select></td>' +
      '<td><select class="cell-input" onchange="updateEntry(\'' + s.id + '\',' + idx + ',\'rootstock\',this.value)">' + rootSel + '</select></td>' +
      '<td><input class="cell-input" type="text" value="' + (e.transplant || '').replace(/"/g,'&quot;') + '" oninput="updateEntry(\'' + s.id + '\',' + idx + ',\'transplant\',this.value)" placeholder="—"></td>' +
      '<td><input class="cell-input num" type="number" min="0" value="' + (e.quantity || 0) + '" oninput="updateEntry(\'' + s.id + '\',' + idx + ',\'quantity\',this.value)"></td>' +
      '<td><input class="cell-input num" type="number" min="0" max="100" value="' + rate + '" oninput="updateEntry(\'' + s.id + '\',' + idx + ',\'takeRate\',this.value)"></td>' +
      '<td class="cell-auto" data-sellable>' + sellable.toLocaleString() + '</td>' +
      '<td><input class="cell-input num" type="number" min="0" value="' + (e.reservedQty || 0) + '" oninput="updateEntry(\'' + s.id + '\',' + idx + ',\'reservedQty\',this.value)"></td>' +
      '<td><input class="cell-input" type="date" value="' + (e.graftDate || '') + '" onchange="updateEntry(\'' + s.id + '\',' + idx + ',\'graftDate\',this.value)"></td>' +
      '<td><input class="cell-input" type="text" value="' + (e.shipmentYear || '').replace(/"/g,'&quot;') + '" oninput="updateEntry(\'' + s.id + '\',' + idx + ',\'shipmentYear\',this.value)" placeholder="—" style="max-width:80px"></td>' +
      '<td class="cell-del"><button onclick="deleteSheetEntry(\'' + s.id + '\',' + idx + ')" title="Delete row">✕</button></td>' +
    '</tr>';
  }).join('');

  const totalsRow = rows.length > 0
    ? '<tr class="row-totals">' +
      '<td class="cell-label" colspan="6" style="text-align:right;padding:8px 12px">TOTALS (' + rows.length + ' rows)</td>' +
      '<td class="cell-auto" style="font-size:13px">' + tQty.toLocaleString() + '</td>' +
      '<td class="cell-auto" style="color:var(--tx4)">avg</td>' +
      '<td class="cell-auto" style="font-size:13px;color:var(--g700)">' + tSellable.toLocaleString() + '</td>' +
      '<td class="cell-auto" style="font-size:13px">' + tReserved.toLocaleString() + '</td>' +
      '<td colspan="3"></td>' +
    '</tr>'
    : '';

  const empty = rows.length === 0
    ? '<tr><td colspan="13" style="padding:40px;text-align:center;color:var(--tx4)">No variety entries match your filter. Add some with the button above.</td></tr>'
    : '';

  return '<div class="sheet-wrap">' +
    '<div class="sheet-toolbar">' +
      '<button class="sheet-add-btn" onclick="addSheetRow()">+ Add Row</button>' +
      '<button class="sheet-csv-btn" onclick="exportCsv()">⬇ Export CSV</button>' +
      '<input class="sheet-filter" type="text" placeholder="Filter rows..." value="' + _sheetFilter.replace(/"/g,'&quot;') + '" oninput="setSheetFilter(this.value)">' +
      '<span class="sheet-info" id="sheet-save-status">Ready · Click any cell to edit</span>' +
    '</div>' +
    '<div class="sheet-scroll">' +
      '<table class="sheet">' +
      '<thead><tr>' +
        '<th>House</th><th>Sub-house</th><th>Type</th>' +
        '<th>Scion</th><th>Rootstock</th><th>Notes</th>' +
        '<th class="num">Qty</th><th class="num">Take %</th><th class="num">Sellable</th>' +
        '<th class="num">Reserved</th><th>Graft Date</th><th>Ship Yr</th><th></th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHtml + empty + totalsRow + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function setSheetFilter(v) {
  _sheetFilter = v;
  // Re-render only the table body to avoid losing focus
  renderHome();
  // Restore focus on filter input
  setTimeout(() => {
    const el = document.querySelector('.sheet-filter');
    if (el) { el.focus(); el.setSelectionRange(v.length, v.length); }
  }, 0);
}

function updateEntry(sectionId, entryIdx, field, value) {
  const s = SECTIONS[sectionId];
  if (!s || !s.entries[entryIdx]) return;
  const numFields = ['quantity', 'takeRate', 'reservedQty'];
  if (numFields.includes(field)) {
    value = parseInt(value) || 0;
    if (field === 'takeRate') value = Math.min(100, Math.max(0, value));
  }
  s.entries[entryIdx][field] = value;

  // Recalculate sellable for this row inline
  const row = document.querySelector('tr[data-k="' + sectionId + ':' + entryIdx + '"]');
  if (row) {
    const e = s.entries[entryIdx];
    const rate = e.takeRate !== undefined ? e.takeRate : 85;
    const sellable = Math.floor((e.quantity || 0) * rate / 100);
    const sellCell = row.querySelector('[data-sellable]');
    if (sellCell) sellCell.textContent = sellable.toLocaleString();
  }

  // Update stats
  renderStats();

  // Queue save (debounced)
  _pendingSaves.add(sectionId);
  setSaveStatus('saving');
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(flushSaves, 1000);
}

async function flushSaves() {
  if (_pendingSaves.size === 0) { setSaveStatus('saved'); return; }
  const ids = Array.from(_pendingSaves);
  _pendingSaves.clear();
  for (const id of ids) {
    const s = SECTIONS[id];
    if (s) await saveSectionToCloud(s);
  }
  setSaveStatus('saved');
}

function setSaveStatus(state) {
  const el = document.getElementById('sheet-save-status');
  if (!el) return;
  el.classList.remove('saving', 'saved');
  if (state === 'saving') {
    el.textContent = '● Saving...';
    el.classList.add('saving');
  } else if (state === 'saved') {
    el.textContent = '✓ All changes saved';
    el.classList.add('saved');
    setTimeout(() => {
      if (el.textContent === '✓ All changes saved') el.textContent = 'Ready · Click any cell to edit';
    }, 2000);
  }
}

function addSheetRow() {
  // Prompt for which house to add to
  const houseId = prompt('Add to which house? (e.g. H1-North3 or H2-South5)\n\nFormat: H1-North1 through H1-South8, or H2-North1 through H2-South20');
  if (!houseId) return;
  const s = SECTIONS[houseId.trim()];
  if (!s) { alert('House not found. Try H1-North1, H2-South5, etc.'); return; }
  s.entries.push({ scion:'', rootstock:'', transplant:'', quantity:0, takeRate:85, graftDate:'', shipmentYear:'', reservedQty:0 });
  saveSectionToCloud(s);
  renderHome();
  // Scroll to the new row at top
  setTimeout(() => {
    const row = document.querySelector('tr[data-k="' + s.id + ':' + (s.entries.length-1) + '"]');
    if (row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.querySelector('select')?.focus(); }
  }, 100);
}

async function deleteSheetEntry(sectionId, entryIdx) {
  const s = SECTIONS[sectionId];
  if (!s || !s.entries[entryIdx]) return;
  const e = s.entries[entryIdx];
  const label = (e.scion || 'empty') + '/' + (e.rootstock || 'none') + ' (' + (e.quantity || 0) + ')';
  if (!confirm('Delete this row? ' + label)) return;
  s.entries.splice(entryIdx, 1);
  await saveSectionToCloud(s);
  renderHome();
}

function exportCsv() {
  const headers = ['House','Sub-house','Type','Scion','Rootstock','Notes','Quantity','Take Rate %','Sellable','Reserved','Graft Date','Shipment Year'];
  const rows = [headers.join(',')];
  Object.values(SECTIONS).forEach(s => {
    (s.entries || []).forEach(e => {
      const rate = e.takeRate !== undefined ? e.takeRate : 85;
      const sellable = Math.floor((e.quantity || 0) * rate / 100);
      const cells = [
        s.house, s.subhouse, s.sectionType,
        e.scion || '', e.rootstock || '', e.transplant || '',
        e.quantity || 0, rate, sellable, e.reservedQty || 0,
        e.graftDate || '', e.shipmentYear || ''
      ].map(v => {
        const str = String(v);
        return str.includes(',') || str.includes('"') ? '"' + str.replace(/"/g,'""') + '"' : str;
      });
      rows.push(cells.join(','));
    });
  });
  const csv = rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mg_nursery_inventory_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

function buildMapCell(s, faded) {
  const cls = getMapClass(s);
  const entries = s.entries || [];
  const top = entries[0];
  const totalQty = entries.reduce((sum, e) => sum + (e.quantity || 0), 0);
  const variety = top ? (top.scion || top.rootstock || '') : '';
  const shortVar = variety.length > 9 ? variety.substring(0, 8) + '…' : variety;
  const fade = faded ? 'opacity:.25' : '';
  const tip = s.house + ' ' + s.subhouse + (variety ? ' — ' + variety : '') + (entries.length > 1 ? ' (+' + (entries.length - 1) + ')' : '');
  return '<div class="map-cell ' + cls + '" style="' + fade + '" onclick="openSection(\'' + s.id + '\')" title="' + tip + '">' +
    '<div class="map-cell-num">' + s.sectionIdx + '</div>' +
    (variety ? '<div class="map-cell-var">' + shortVar + '</div>' : '') +
    (totalQty > 0 ? '<div class="map-cell-count">' + (totalQty >= 1000 ? Math.round(totalQty/1000) + 'k' : totalQty) + '</div>' : '') +
  '</div>';
}

// Cache for history fetched per section (cleared when reloading)
let _sectionHistoryCache = {};

async function loadSectionHistory(sectionId) {
  if (!cloudOk || !sb) return [];
  try {
    const { data, error } = await sb.from('nursery_tasks')
      .select('*')
      .eq('section_id', sectionId)
      .in('status', ['completed', 'deleted'])
      .order('completed_at', { ascending: false, nullsFirst: false });
    if (error) { console.warn('History load error:', error); return []; }
    _sectionHistoryCache[sectionId] = data || [];
    return data || [];
  } catch (e) {
    console.warn('History load exception:', e);
    return [];
  }
}

function renderSectionHistory(sectionId) {
  const rows = _sectionHistoryCache[sectionId];
  const containerId = 'section-history-content';
  const container = document.getElementById(containerId);
  if (!container) return;
  if (!rows || rows.length === 0) {
    container.innerHTML = '<div style="padding:14px 12px;color:#9CA3AF;font-size:13px;text-align:center">No history yet for this section</div>';
    return;
  }
  // Render each row as a compact history item
  const html = rows.map(r => {
    const isCompleted = r.status === 'completed';
    const ts = r.completed_at || r.created_at || '';
    const tsDate = ts ? new Date(ts) : null;
    const tsLabel = tsDate
      ? tsDate.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) + ' · ' + tsDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
      : 'Unknown date';
    const icon = isCompleted ? '✓' : '✗';
    const iconColor = isCompleted ? '#16A34A' : '#9CA3AF';
    const bgColor = isCompleted ? '#F0FDF4' : '#F9FAFB';
    const borderColor = isCompleted ? '#BBF7D0' : '#E5E7EB';
    const assigneePart = r.assignee ? '<span style="font-size:11px;background:#DBEAFE;color:#1E40AF;border-radius:6px;padding:1px 6px;margin-left:6px">@' + r.assignee + '</span>' : '';
    const statusLabel = isCompleted ? 'Completed' : 'Removed';
    return '<div style="background:' + bgColor + ';border:1px solid ' + borderColor + ';border-radius:10px;padding:10px 12px;margin-bottom:6px">' +
      '<div style="display:flex;align-items:flex-start;gap:8px">' +
        '<div style="font-size:16px;color:' + iconColor + ';font-weight:800;line-height:1.2;margin-top:1px">' + icon + '</div>' +
        '<div style="flex:1">' +
          '<div style="font-size:13px;font-weight:600;color:#111827">' + (r.task || '(no description)') + assigneePart + '</div>' +
          '<div style="font-size:11px;color:#6B7280;margin-top:2px">' + statusLabel + ' · ' + tsLabel + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  container.innerHTML = html;
}

function openSection(sectionId) {
  currentSectionId = sectionId;
  const s = SECTIONS[sectionId];
  if (!s) return;
  document.getElementById('home-content').innerHTML = '';
  const detail = document.getElementById('detail-content');
  detail.classList.add('open');

  const entries = s.entries || [];
  const totalQty = entries.reduce((sum, e) => {
    // Sleeves don't count toward "Planted" total in a section
    return _entryType(e) === 'Sleeve' ? sum : sum + (e.quantity || 0);
  }, 0);
  const totalSellable = entries.reduce((sum, e) => {
    if (_entryType(e) !== 'Grafted Tree') return sum;
    return sum + Math.floor((e.quantity || 0) * (e.takeRate !== undefined ? e.takeRate : 85) / 100);
  }, 0);
  const totalReserved = entries.reduce((sum, e) => sum + (e.reservedQty || 0), 0);

  // Sort entries by row placement (Row 1A, 1B, 2, 3 ...) for display order,
  // but preserve the original index so editEntry/deleteEntry still target the right element
  const indexedEntries = entries.map((e, originalIdx) => ({e, originalIdx}));
  indexedEntries.sort((a, b) => {
    const rowA = parseInt(a.e.row) || 99;
    const rowB = parseInt(b.e.row) || 99;
    if (rowA !== rowB) return rowA - rowB;
    return (a.e.rowSub || '').localeCompare(b.e.rowSub || '');
  });

  const entriesHtml = entries.length
    ? '<div class="entries-table">' +
      '<div class="entries-header"><div>Scion</div><div>Rootstock</div><div style="text-align:right">Qty</div><div style="text-align:right">Sellable</div><div></div></div>' +
      indexedEntries.map(({e, originalIdx}) => {
        const i = originalIdx;
        const et = _entryType(e);
        const rate = e.takeRate !== undefined ? e.takeRate : 85;
        // Sleeves & Seedlings have no sellable count
        const isGrafted = (et === 'Grafted Tree');
        const sellable = isGrafted ? Math.floor((e.quantity || 0) * rate / 100) : 0;
        const meta = [];
        // Placement (Row X[A/B/C]) shows first in meta — visible at a glance
        if (e.row) meta.push('Row ' + e.row + (e.rowSub || ''));
        if (e.transplant) meta.push(e.transplant);
        if (e.graftDate) meta.push('Graft: ' + new Date(e.graftDate + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}));
        if (e.shipmentYear) meta.push('Ship: ' + e.shipmentYear);
        // Label varies by type
        let scionLabel;
        if (et === 'Sleeve') scionLabel = '<em style="color:#92400E">Empty Sleeves</em>';
        else if (et === 'Seedling') scionLabel = '<em style="color:#1E40AF">Seedling</em>';
        else scionLabel = e.scion || '—';
        return '<div class="entry-row" onclick="editEntry(' + i + ')">' +
          '<div><div class="entry-scion">' + scionLabel + _typeBadge(et) + '</div>' + (meta.length ? '<div class="entry-meta">' + meta.join(' · ') + '</div>' : '') + '</div>' +
          '<div class="entry-rootstock">' + (e.rootstock || '—') + '</div>' +
          '<div class="entry-qty">' + (e.quantity || 0).toLocaleString() + (isGrafted ? '<div class="entry-meta" style="margin-top:2px">' + rate + '%</div>' : '') + '</div>' +
          '<div class="entry-sellable">' + (isGrafted ? sellable.toLocaleString() : '—') + '</div>' +
          '<button class="del-btn" onclick="event.stopPropagation();deleteEntry(' + i + ')">✕</button>' +
        '</div>';
      }).join('') +
    '</div>'
    : '<div class="no-tasks">No varieties planted in this house</div>';

  const activeTasks = (s.tasks || []).filter(t => t.startsWith('TASK:'));
  const tasksHtml = activeTasks.length
    ? activeTasks.map((t, i) => {
        const label = t.replace('TASK:','').trim();
        return '<div class="task-item"><div class="task-dot"></div><div style="flex:1">' + label + '</div>' +
          '<button class="del-btn" onclick="deleteTask(' + i + ')">✕</button></div>';
      }).join('')
    : '';

  detail.innerHTML =
    '<div class="detail-hero">' +
      '<button class="detail-back" onclick="goHome()">&larr; All Houses</button>' +
      '<div class="detail-id">' + s.house + ' · ' + s.id + '</div>' +
      '<div class="detail-name">' + s.subhouse + '</div>' +
      '<div class="detail-sub">' + s.sectionType + ' · ' + entries.length + ' variet' + (entries.length === 1 ? 'y' : 'ies') + '</div>' +
      '<div class="detail-tags">' +
        '<div class="detail-tag">🌳 ' + s.sectionType + '</div>' +
        '<div class="detail-tag">📍 ' + s.side + ' side, position ' + s.sectionIdx + '</div>' +
        (totalQty > 0 ? '<div class="detail-tag">' + totalQty.toLocaleString() + ' trees</div>' : '') +
        (totalSellable > 0 ? '<div class="detail-tag">' + totalSellable.toLocaleString() + ' sellable</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="section-title"><span>Variety Inventory (' + entries.length + ')</span>' +
        (totalReserved > 0 ? '<span style="font-weight:600;color:var(--g700);text-transform:none">' + totalReserved.toLocaleString() + ' reserved</span>' : '') +
      '</div>' +
      entriesHtml +
      '<button class="add-entry-btn" onclick="addEntry()">+ Add Variety Entry</button>' +
      '<div style="margin-top:24px">' +
        '<div class="section-title"><span>Active Tasks (' + activeTasks.length + ')</span></div>' +
        (tasksHtml ? '<div class="tasks-list">' + tasksHtml + '</div>' : '<div class="no-tasks">No active tasks for this house</div>') +
      '</div>' +
      '<div style="margin-top:24px">' +
        '<div class="section-title"><span>History</span></div>' +
        '<div id="section-history-content"><div style="padding:14px 12px;color:#9CA3AF;font-size:13px;text-align:center">Loading…</div></div>' +
      '</div>' +
      '<div class="action-bar">' +
        '<button class="btn-primary" onclick="addEntry()">🌱 Add Variety</button>' +
        '<button class="btn-secondary" onclick="openTaskModal()">📋 Add Task</button>' +
      '</div>' +
    '</div>';

  // Fetch and render history asynchronously (doesn't block the rest of the page)
  loadSectionHistory(sectionId).then(() => renderSectionHistory(sectionId));
}

function goHome() {
  currentSectionId = null;
  document.getElementById('detail-content').classList.remove('open');
  renderHome();
}

function addEntry() {
  currentEntryIdx = null;
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  document.getElementById('entry-modal-title').textContent = 'Add Variety Entry';
  document.getElementById('entry-modal-section').textContent = s.house + ' · ' + s.subhouse + ' · ' + s.sectionType;
  ['entry-scion','entry-rootstock','entry-transplant','entry-qty','entry-graft','entry-shipment','entry-row','entry-rowsub'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('entry-takerate').value = 70;
  document.getElementById('entry-type').value = 'Grafted Tree';
  document.getElementById('modal-entry').classList.add('open');
}

function editEntry(idx) {
  currentEntryIdx = idx;
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  const e = s.entries[idx];
  if (!e) return;
  document.getElementById('entry-modal-title').textContent = 'Edit Variety Entry';
  document.getElementById('entry-modal-section').textContent = s.house + ' · ' + s.subhouse;
  // Backward-compat: infer type from existing data if not set
  // Has scion + rootstock = Grafted Tree (current default behavior, preserves existing data)
  // Has rootstock, no scion = Seedling
  // Has nothing = Sleeve
  let inferredType = e.type;
  if (!inferredType) {
    if (e.scion && e.rootstock) inferredType = 'Grafted Tree';
    else if (e.rootstock && !e.scion) inferredType = 'Seedling';
    else if (!e.scion && !e.rootstock && (e.quantity || 0) > 0) inferredType = 'Sleeve';
    else inferredType = 'Grafted Tree';
  }
  document.getElementById('entry-type').value = inferredType;
  document.getElementById('entry-scion').value = e.scion || '';
  document.getElementById('entry-rootstock').value = e.rootstock || '';
  document.getElementById('entry-transplant').value = e.transplant || '';
  document.getElementById('entry-qty').value = e.quantity || '';
  document.getElementById('entry-takerate').value = e.takeRate !== undefined ? e.takeRate : 85;
  document.getElementById('entry-graft').value = e.graftDate || '';
  document.getElementById('entry-shipment').value = e.shipmentYear || '';
  document.getElementById('entry-row').value = e.row || '';
  document.getElementById('entry-rowsub').value = e.rowSub || '';
  document.getElementById('modal-entry').classList.add('open');
}

function closeEntryModal() { document.getElementById('modal-entry').classList.remove('open'); }

async function saveEntry() {
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  const entry = {
    type: document.getElementById('entry-type').value || 'Grafted Tree',
    scion: document.getElementById('entry-scion').value,
    rootstock: document.getElementById('entry-rootstock').value,
    transplant: document.getElementById('entry-transplant').value.trim(),
    quantity: parseInt(document.getElementById('entry-qty').value) || 0,
    takeRate: parseInt(document.getElementById('entry-takerate').value) || 70,
    graftDate: document.getElementById('entry-graft').value || '',
    shipmentYear: document.getElementById('entry-shipment').value.trim(),
    row: document.getElementById('entry-row').value || '',
    rowSub: document.getElementById('entry-rowsub').value || '',
    reservedQty: currentEntryIdx !== null && s.entries[currentEntryIdx] ? (s.entries[currentEntryIdx].reservedQty || 0) : 0,
  };
  // Sleeves don't have scion, rootstock, take rate, or graft date — clean them out
  if (entry.type === 'Sleeve') {
    entry.scion = '';
    entry.rootstock = '';
    entry.graftDate = '';
  }
  // Seedlings don't have scion or graft date (not grafted yet)
  if (entry.type === 'Seedling') {
    entry.scion = '';
    entry.graftDate = '';
  }
  // Validate per-type
  if (entry.type === 'Sleeve') {
    if (!entry.quantity) { alert('Please enter the quantity of empty sleeves.'); return; }
  } else if (entry.type === 'Seedling') {
    if (!entry.rootstock) { alert('Please select a rootstock for the seedling.'); return; }
    if (!entry.quantity) { alert('Please enter the quantity of seedlings.'); return; }
  } else {
    if (!entry.scion && !entry.rootstock && !entry.quantity) {
      alert('Please enter at least a scion, rootstock, or quantity.');
      return;
    }
  }
  if (currentEntryIdx === null) s.entries.push(entry);
  else s.entries[currentEntryIdx] = entry;
  closeEntryModal();
  await saveSectionToCloud(s);
  openSection(currentSectionId);
}

async function deleteEntry(idx) {
  if (!confirm('Remove this variety entry?')) return;
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  s.entries.splice(idx, 1);
  await saveSectionToCloud(s);
  openSection(currentSectionId);
}

function openTaskModal() {
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  document.getElementById('task-modal-section').textContent = s.house + ' · ' + s.subhouse;
  document.getElementById('task-input').value = '';
  document.getElementById('task-date').value = '';
  document.getElementById('task-assignee').value = '';
  document.getElementById('modal-task').classList.add('open');
}

function closeTaskModal() { document.getElementById('modal-task').classList.remove('open'); }
function quickTask(text) { document.getElementById('task-input').value = text; }

async function submitTask() {
  await _submitTaskCore(false);
}

async function submitTaskAndSendWA() {
  await _submitTaskCore(true);
}

// Generate a v4-style UUID client-side so we can include the task ID in the WhatsApp link
// before the database insert completes. Then the cloud insert uses our pre-made ID.
function _uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

async function _saveTaskToCloudWithId(taskId, sectionId, task, date, assignee) {
  if (!cloudOk) return null;
  try {
    const { data, error } = await sb.from('nursery_tasks').insert({
      id: taskId,
      section_id: sectionId, task: task,
      scheduled_date: date || null, assignee: assignee || null,
      status: 'pending', created_at: new Date().toISOString(),
    }).select().single();
    if (error) { console.warn('saveTaskWithId error:', error); return null; }
    return data ? data.id : null;
  } catch(e) { console.warn('saveTaskWithId exception:', e); return null; }
}

async function _submitTaskCore(sendWhatsApp) {
  const task = document.getElementById('task-input').value.trim();
  if (!task) { alert('Please enter a task description.'); return; }
  const date = document.getElementById('task-date').value;
  const assignee = document.getElementById('task-assignee').value.trim();
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  const taskWithDate = date ? '[' + date + '] ' + task : task;

  // Pre-generate a task ID client-side so we can include it in the WhatsApp link
  // before the cloud insert completes
  const taskId = _uuid();

  // STEP 1: If sending WhatsApp, OPEN THE LINK FIRST while we still have a valid user gesture.
  // Use the pre-generated taskId so the recipient can one-tap to complete.
  if (sendWhatsApp) {
    const sectionLabel = s.house + ' ' + s.subhouse + ' (' + s.sectionType + ')';
    const dateStr = date ? '\nDate: ' + date : '';
    const assigneeStr = assignee ? '\nFor: ' + assignee : '';
    const baseUrl = window.location.origin;
    const completeUrl = baseUrl + '#section=' + encodeURIComponent(currentSectionId) + '&complete=' + taskId;
    const msg = 'M&G Nursery — Task\n' +
                'Section: ' + sectionLabel + '\n' +
                'Task: ' + task + dateStr + assigneeStr + '\n\n' +
                'Tap to mark complete when done:\n' + completeUrl;
    const waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
    const w = window.open(waUrl, '_blank');
    if (!w || w.closed || typeof w.closed === 'undefined') {
      console.warn('[task-wa] window.open blocked, falling back to location.href');
      _saveTaskToCloudWithId(taskId, currentSectionId, taskWithDate, date, assignee).catch(e => console.warn(e));
      s.tasks.push('TASK: ' + taskWithDate);
      window.location.href = waUrl;
      return;
    }
  }

  // STEP 2: Now do the local + cloud save (using our pre-generated taskId)
  s.tasks.push('TASK: ' + taskWithDate);
  closeTaskModal();
  await _saveTaskToCloudWithId(taskId, currentSectionId, taskWithDate, date, assignee);
  openSection(currentSectionId);
}

async function deleteTask(idx) {
  if (!confirm('Remove this task?')) return;
  const s = SECTIONS[currentSectionId];
  if (!s) return;
  const task = s.tasks[idx];
  s.tasks.splice(idx, 1);
  if (cloudOk && task) {
    try {
      await sb.from('nursery_tasks').update({status:'deleted'}).eq('section_id', currentSectionId).eq('task', task.replace('TASK:','').trim()).eq('status','pending');
    } catch(e) {}
  }
  // Invalidate history cache so the deletion shows up
  delete _sectionHistoryCache[currentSectionId];
  openSection(currentSectionId);
}

function exportBackup() {
  try {
    // Build a snapshot of all sections + pending tasks
    const sectionsData = Object.values(SECTIONS).map(s => ({
      section_id: s.id,
      house: s.house,
      subhouse: s.subhouse,
      side: s.side,
      section_idx: s.sectionIdx,
      section_type: s.sectionType,
      entries: s.entries || [],
      take_rate: s.takeRate || 85,
      tasks: s.tasks || [],
    }));
    const data = {
      sections: sectionsData,
      exported_at: new Date().toISOString(),
      device: navigator.userAgent,
      app: 'mg-nursery-tracker',
      version: 1,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mg_nursery_backup_' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    const totalTrees = sectionsData.reduce((sum, s) =>
      sum + (s.entries || []).reduce((q, e) => q + (parseInt(e.quantity) || 0), 0), 0);
    alert('Backup downloaded.\n\n' + sectionsData.length + ' sections, ' + totalTrees.toLocaleString() + ' trees.');
  } catch (e) {
    alert('Backup failed: ' + e.message);
  }
}

async function restoreFromBackup() {
  if (!cloudOk) {
    alert('Cloud not connected. Restore requires Supabase access.');
    return;
  }
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.json,application/json';
  fileInput.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      const sections = backup.sections || [];
      if (!sections.length) {
        alert('Backup file has no sections.');
        return;
      }
      if (!confirm('Restore ' + sections.length + ' sections from backup?\n\nThis will OVERWRITE existing inventory entries for any section in the backup. Sections not in the backup will be unaffected.\n\nContinue?')) {
        return;
      }
      let ok = 0, fail = 0;
      for (const s of sections) {
        const row = {
          section_id: s.section_id,
          house: s.house || 'House 1',
          subhouse: s.subhouse || '',
          side: s.side || 'North',
          section_idx: s.section_idx || 1,
          section_type: s.section_type || 'Tree House',
          entries: s.entries || [],
          take_rate: s.take_rate || 85,
          updated_at: new Date().toISOString(),
        };
        try {
          const res = await sb.from('nursery_sections_v2').upsert(row, { onConflict: 'section_id' });
          if (res.error) { console.warn('Restore failed for', s.section_id, ':', res.error.message); fail++; }
          else { ok++; }
        } catch (err) {
          console.warn('Restore exception for', s.section_id, ':', err);
          fail++;
        }
      }
      alert('Restore complete.\n\nRestored: ' + ok + '\nFailed: ' + fail + '\n\nReloading data...');
      // Reload from cloud to refresh local state
      await loadFromCloud();
    } catch (err) {
      alert('Restore failed: ' + err.message);
      console.error('Restore error:', err);
    }
  };
  fileInput.click();
}

// ── DEEP LINK HANDLER ─────────────────────────────────────────────────────
// Handles URLs like:
//   #section=H2-South12                  → opens that section
//   #section=H2-South12&complete=<uuid>  → opens section + prompts to complete task
//   #H2-South12                          → legacy format, opens that section
async function handleDeepLink() {
  const hash = window.location.hash.replace(/^#/, '');
  if (!hash) return;

  let sectionId = '';
  let completeId = '';

  if (hash.indexOf('=') >= 0) {
    // Modern format: section=...&complete=...
    const params = new URLSearchParams(hash);
    sectionId = decodeURIComponent(params.get('section') || '');
    completeId = params.get('complete') || '';
  } else {
    // Legacy format: just the section ID after #
    sectionId = hash;
  }

  if (sectionId && SECTIONS[sectionId]) {
    openSection(sectionId);
  }

  if (completeId) {
    // Wait briefly for cloud task rows to load, then show completion prompt
    setTimeout(() => _promptCompleteFromLink(completeId, sectionId), 500);
  }
}

async function _promptCompleteFromLink(taskId, sectionId) {
  // Fetch fresh task data to confirm it exists and is still pending
  if (!cloudOk) {
    alert('Cloud not connected — cannot mark task complete right now.');
    return;
  }
  try {
    const { data, error } = await sb.from('nursery_tasks').select('*').eq('id', taskId).single();
    if (error || !data) {
      alert('This task could not be found. It may have been deleted.');
      // Clear the hash so refreshing doesn't re-prompt
      history.replaceState(null, '', window.location.pathname);
      return;
    }
    if (data.status === 'completed') {
      alert('This task was already marked complete on ' + new Date(data.completed_at).toLocaleString() + '.');
      history.replaceState(null, '', window.location.pathname + '#section=' + encodeURIComponent(sectionId));
      return;
    }
    if (data.status === 'deleted') {
      alert('This task was removed.');
      history.replaceState(null, '', window.location.pathname + '#section=' + encodeURIComponent(sectionId));
      return;
    }
    // Pending — ask for confirmation
    const dateStr = data.scheduled_date ? '\nDate: ' + data.scheduled_date : '';
    const assigneeStr = data.assignee ? '\nFor: @' + data.assignee : '';
    const ok = confirm('Mark this task as complete?\n\n"' + data.task + '"' + dateStr + assigneeStr);
    if (!ok) {
      history.replaceState(null, '', window.location.pathname + '#section=' + encodeURIComponent(sectionId));
      return;
    }
    // Mark complete in cloud
    const upd = await sb.from('nursery_tasks').update({
      status: 'completed',
      completed_at: new Date().toISOString(),
    }).eq('id', taskId);
    if (upd.error) {
      alert('Could not save: ' + upd.error.message);
      return;
    }
    // Remove from local memory
    const s = SECTIONS[sectionId];
    if (s && s.tasks) {
      const cleanedLabel = data.task.replace(/^\[[\d-]+\]\s*/, '').trim();
      s.tasks = s.tasks.filter(t => {
        const local = t.replace('TASK:', '').replace(/^\[[\d-]+\]\s*/, '').trim();
        return local !== cleanedLabel;
      });
    }
    // Invalidate history cache so completion appears
    if (typeof _sectionHistoryCache !== 'undefined') delete _sectionHistoryCache[sectionId];
    // Reload tasks then re-render
    if (typeof _loadNurseryTaskRows === 'function') await _loadNurseryTaskRows();
    // Clear the hash and reopen the section
    history.replaceState(null, '', window.location.pathname + '#section=' + encodeURIComponent(sectionId));
    alert('Task marked complete ✓');
    if (sectionId && SECTIONS[sectionId]) openSection(sectionId);
    else renderHome();
  } catch(e) {
    console.warn('_promptCompleteFromLink exception:', e);
    alert('Something went wrong. Try again from the Tasks tab.');
  }
}
